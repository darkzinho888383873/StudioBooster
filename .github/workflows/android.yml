name: StudioBooster CI

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - 'resources/**'
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build StudioBooster
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4

    - name: ☕ Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: 🔎 Locate or prepare Gradle
      run: |
        set -e
        echo "Searching for gradlew in repo..."
        if [ -f "./gradlew" ]; then
          echo "Found ./gradlew"
          chmod +x ./gradlew
          echo "GRADLEW=./gradlew" >> $GITHUB_ENV
        else
          gw=$(find . -maxdepth 4 -name gradlew -print -quit || true)
          if [ -n "$gw" ]; then
            echo "Found gradlew at $gw"
            chmod +x "$gw"
            echo "GRADLEW=$gw" >> $GITHUB_ENV
          else
            echo "gradlew not found. Installing Gradle CLI to run builds instead."
            GRADLE_VERSION=8.6
            curl -sLo gradle.zip https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip
            unzip -q gradle.zip -d gradle-dist
            echo "PATH=$(pwd)/gradle-dist/gradle-${GRADLE_VERSION}/bin:$PATH" >> $GITHUB_ENV
            echo "GRADLEW=gradle" >> $GITHUB_ENV
          fi
        fi

    - name: 🧹 Clean Build
      run: $GRADLEW clean

    - name: 🔍 Lint Check
      run: $GRADLEW lint

    - name: 🧪 Unit Tests
      run: $GRADLEW test

    - name: 📦 Build Debug APK
      run: $GRADLEW assembleDebug

    - name: 📦 Build Release APK
      run: $GRADLEW assembleRelease

    - name: 📤 Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: StudioBooster-Debug
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: 📤 Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: StudioBooster-Release
        path: app/build/outputs/apk/release/app-release-unsigned.apk

  check-resources:
    name: Verify Resources
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: 🔍 Check Fonts
      run: |
        if [ -f "resources/fonts/minecraft.ttf" ]; then
          echo "✅ Minecraft font found"
        else
          echo "⚠️ Minecraft font missing"
        fi
        
        if [ -f "resources/fonts/comic_sans.ttf" ]; then
          echo "✅ Comic Sans font found"
        else
          echo "⚠️ Comic Sans font missing"
        fi
    
    - name: 🔍 Check Structure
      run: |
        echo "Checking StudioBooster structure..."
        [ -d "boosternet" ] && echo "✅ boosternet/" || echo "❌ boosternet/"
        [ -d "resources" ] && echo "✅ resources/" || echo "❌ resources/"
        [ -d "ui" ] && echo "✅ ui/" || echo "❌ ui/"
        [ -d "functions" ] && echo "✅ functions/" || echo "❌ functions/"
