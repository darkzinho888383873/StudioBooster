name: StudioBooster CI

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - 'resources/**'
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build StudioBooster
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4

    - name: ☕ Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: 🔑 Grant gradlew permission
      run: chmod +x gradlew

    - name: 🧹 Clean Build
      run: ./gradlew clean

    - name: 🔍 Lint Check
      run: ./gradlew lint

    - name: 🧪 Unit Tests
      run: ./gradlew test

    - name: 📦 Build Debug APK
      run: ./gradlew assembleDebug

    - name: 📦 Build Release APK
      run: ./gradlew assembleRelease

    - name: 📤 Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: StudioBooster-Debug
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: 📤 Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: StudioBooster-Release
        path: app/build/outputs/apk/release/app-release-unsigned.apk

  check-resources:
    name: Verify Resources
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: 🔍 Check Fonts
      run: |
        if [ -f "resources/fonts/minecraft.ttf" ]; then
          echo "✅ Minecraft font found"
        else
          echo "⚠️ Minecraft font missing"
        fi
        
        if [ -f "resources/fonts/comic_sans.ttf" ]; then
          echo "✅ Comic Sans font found"
        else
          echo "⚠️ Comic Sans font missing"
        fi
    
    - name: 🔍 Check Structure
      run: |
        echo "Checking StudioBooster structure..."
        [ -d "boosternet" ] && echo "✅ boosternet/" || echo "❌ boosternet/"
        [ -d "resources" ] && echo "✅ resources/" || echo "❌ resources/"
        [ -d "ui" ] && echo "✅ ui/" || echo "❌ ui/"
        [ -d "functions" ] && echo "✅ functions/" || echo "❌ functions/"
